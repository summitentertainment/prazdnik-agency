<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная №8 - Массивы и объекты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        h2 {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            font-weight: normal;
        }
        
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        ul {
            list-style: none;
            padding: 0;
        }
        
        li {
            background: #e9ecef;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .add-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Лабораторная работа №8</h1>
        <h2>Массивы и объекты в JavaScript</h2>
        
        <div class="section">
            <h3>Список пользователей</h3>
            <ul id="userList"></ul>
        </div>
        
        <div class="add-section">
            <h3>Добавить пользователя</h3>
            <input type="text" id="newName" placeholder="Имя">
            <input type="number" id="newAge" placeholder="Возраст">
            <input type="text" id="newCity" placeholder="Город">
            <button id="addUserBtn">Добавить пользователя</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
